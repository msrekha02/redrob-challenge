methodology_summary: |
  Two-phase CPU-only ranking pipeline. Phase A runs offline: a 14-trap
  honeypot filter reduces 100K candidates to producing clean profiles, which
  are indexed on two independent tracks — role trajectory and capability
  stack — using BGE-small-en-v1.5 ONNX INT8 embeddings and dual BM25Okapi
  indexes. Phase B runs per JD in under three minutes: the JD text is
  parsed with regex and BGE-small to extract YoE range, preferred cities,
  notice period, and disqualifier conditions dynamically. Hybrid retrieval
  (dense + sparse, four lists) fused via RRF produces a top-1,000 pool.
  A 20-signal penalty gate applies availability, location, integrity, and
  JD-fit multipliers with percentile-clipped score normalisation, reducing
  to top-200. BGE-reranker-base ONNX INT8 cross-encodes the remaining
  pairs against the full JD text, producing a final top-100. A honeypot
  safety net re-runs all 14 traps on the output and backfills if needed.
  All thresholds are extracted from the JD at runtime — no retraining or
  reconfiguration required for a new JD or candidate pool.


